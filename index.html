<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <title>環境ヘルスチェック</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌡️</text></svg>" />
  </head>
  <body>
    <main id="app">
      <header class="hero">
        <div class="hero-row">
          <h1>環境ヘルスチェック</h1>
          <button id="refresh" class="icon-btn" title="再取得" aria-label="再取得">↻</button>
        </div>
        <p id="location" class="muted">位置情報を取得中…</p>
      </header>

      <section id="summary" class="summary card" hidden>
        <div class="summary-headline">
          <span class="summary-label">総合リスク</span>
          <span id="summary-level" class="level-badge">—</span>
        </div>
        <p id="summary-message" class="summary-message"></p>
      </section>

      <section id="cards" class="cards"></section>

      <section id="pressure" class="card pressure-card" hidden>
        <header class="card-header">
          <h2>気圧の推移（過去24h〜先24h）</h2>
        </header>
        <div id="pressure-chart"></div>
        <p class="muted small" id="pressure-note"></p>
      </section>

      <section id="status" class="status">
        <p id="status-text" class="muted">待機中…</p>
      </section>

      <footer class="footer muted small">
        <p>データ提供: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> ／ 偏頭痛・熱中症リスクは気象データからの推定値で、医学的助言ではありません。</p>
      </footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
